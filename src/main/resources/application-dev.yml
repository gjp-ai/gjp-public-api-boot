spring:
  devtools:
    restart:
      enabled: true
  jackson:
    serialization:
      indent-output: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  datasource:
    url: jdbc:mysql://localhost:3306/gjp_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}

cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:8084
    - http://127.0.0.1:3000
    - http://127.0.0.1:8084

logging:
  level:
    org.ganjp.api: DEBUG
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# ── CMS (dev overrides) ──
cms:
  base-url: ${CMS_BASE_URL:http://localhost:8084/api}
