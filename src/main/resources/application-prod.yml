server:
  tomcat:
    max-threads: 200
    min-spare-threads: 20

spring:
  devtools:
    restart:
      enabled: false
  jackson:
    serialization:
      indent-output: false
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

cors:
  allowed-origins:
    - https://ganjianping.com
    - https://www.ganjianping.com

logging:
  level:
    org.ganjp.api: WARN
    org.springframework: WARN
  file:
    name: logs/gjp-open-api-boot.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ── CMS (prod overrides) ──
cms:
  base-url: ${CMS_BASE_URL:https://www.ganjianping.com/api}
